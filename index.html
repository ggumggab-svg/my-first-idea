<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2d0a0a 0%, #0f0f0f 100%);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            color: #ffffff;
        }
        
        .container {
            text-align: center;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 77, 77, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            opacity: 0;
            animation: emerge 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        h1 {
            margin: 0;
            color: #ff4d4d; /* 프리미엄 레드 */
            font-size: 5.5rem; /* 대폭 확대 */
            font-weight: 900;
            letter-spacing: -0.03em;
            text-shadow: 0 0 30px rgba(255, 77, 77, 0.4);
            line-height: 1.2;
        }

        p {
            margin-top: 1.5rem;
            color: rgba(255, 77, 77, 0.6);
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        @keyframes emerge {
            0% {
                transform: scale(0.8) translateY(20px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* 배경에 은은한 붉은 광채 효과 추가 */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 77, 77, 0.1) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1>내 첫번째 아이디어</h1>
        <p>INNOVATION & VISION</p>
    </div>
</body>
</html>
