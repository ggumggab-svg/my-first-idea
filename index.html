<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스</title>
    <style>
        :root {
            --primary: #76c893;
            --secondary: #1b4332;
            --primary-light: #d8f3dc;
            --header-bg: linear-gradient(135deg, #76c893 0%, #52b788 100%);
            --footer-bg: #f8fcf9;
            --main-bg: #ffffff;
            --section-bg-alt: #f0f7f2;
            --text-dark: #1b4332;
            --text-light: #ffffff;
            --text-gray: #5a7d6c;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-dark);
            background: var(--main-bg);
            overflow-x: hidden;
        }

        header {
            background: var(--header-bg);
            padding: 1rem 3rem;
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(118, 200, 147, 0.2);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            cursor: pointer;
        }

        header nav {
            display: flex;
            gap: 2.5rem;
        }

        header nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            opacity: 0.85;
            transition: all 0.3s ease;
            position: relative;
        }

        header nav a:hover {
            opacity: 1;
            transform: translateY(-1px);
        }

        header nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: white;
            transition: width 0.3s ease;
        }

        header nav a:hover::after {
            width: 100%;
        }

        main {
            flex: 1;
        }

        section {
            padding: 6rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .section-feature {
            background: radial-gradient(circle at 10% 20%, rgba(118, 200, 147, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(82, 183, 136, 0.08) 0%, transparent 40%);
            min-height: 80vh;
        }

        .section-reviews {
            background: var(--section-bg-alt);
        }

        .section-title {
            margin-bottom: 3.5rem;
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #1b4332 0%, #40916c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .container {
            text-align: center;
            padding: 4.5rem 5rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 40px 80px rgba(27, 67, 50, 0.05);
            max-width: 800px;
            width: 90%;
            animation: emerge 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .container h2#main-sentence {
            margin: 0;
            color: var(--text-dark);
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .container p.subtitle {
            margin-top: 1.5rem;
            color: rgba(29, 29, 31, 0.5);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
        }

        @keyframes emerge {
            0% {
                transform: scale(0.95) translateY(40px);
                opacity: 0;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 3rem;
            max-width: 1100px;
            width: 100%;
            padding: 0 1rem;
        }

        .review-card {
            background: white;
            padding: 3rem;
            border-radius: 35px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.01);
        }

        .review-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.08);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 1.8rem;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .reviewer-name {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 0.6rem;
            color: var(--text-dark);
        }

        .reviewer-info {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
        }

        .review-text {
            color: var(--text-gray);
            font-size: 1.05rem;
            line-height: 1.7;
            font-style: italic;
        }

        .btn {
            margin-top: 2.8rem;
            padding: 1.2rem 3.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
            background: var(--primary);
            box-shadow: 0 15px 30px rgba(118, 200, 147, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: var(--secondary);
            box-shadow: 0 15px 35px rgba(27, 67, 50, 0.2);
        }

        .btn-theme-1 {
            background: var(--primary);
        }

        .btn-theme-2 {
            background: #95d5b2;
            color: #1b4332;
        }

        .btn-theme-3 {
            background: #52b788;
        }

        .btn-theme-4 {
            background: #40916c;
        }

        footer {
            background: var(--footer-bg);
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        footer p {
            margin: 0;
            color: var(--text-gray);
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <header>
        <h1>나의 첫 서비스</h1>
        <nav>
            <a href="#">소개</a>
            <a href="#">기능</a>
            <a href="#">문의</a>
        </nav>
    </header>

    <main>
        <section class="section-feature">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="container">
                <h2 id="main-sentence">오늘도 힘내세요!</h2>
                <p class="subtitle">INNOVATION & VISION</p>
                <button class="btn" id="next-btn">다음 문장 보기</button>
            </div>
        </section>

        <section class="section-reviews">
            <h2 class="section-title">사용자 후기</h2>
            <div class="review-grid">
                <div class="review-card">
                    <img src="user_profile_1_1775114427568.png" alt="User 1" class="profile-img">
                    <div class="reviewer-name">김민준 팀장</div>
                    <div class="reviewer-info">테크 솔루션즈 IT 운영팀</div>
                    <p class="review-text">"이 서비스를 사용한 이후로 업무 효율이 200% 상승했습니다. 깔끔한 디자인과 직관적인 UI가 정말 마음에 들어요."</p>
                </div>
                <div class="review-card">
                    <img src="user_profile_2_1775114454674.png" alt="User 2" class="profile-img">
                    <div class="reviewer-name">이지원 디자이너</div>
                    <div class="reviewer-info">크리에이티브 스튜디오 아트실</div>
                    <p class="review-text">"디테일 하나하나 신경 쓴 것이 느껴지는 프리미엄 서비스입니다. 사용자 경험이 매우 부드럽고 만족스럽습니다."</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>2026 My Service</p>
    </footer>

    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어!",
            "조금씩 나아지고 있어",
            "그래 이대로 가봐"
        ];
        let currentIndex = 0;

        const titleElement = document.getElementById('main-sentence');
        const nextBtn = document.getElementById('next-btn');

        nextBtn.addEventListener('click', () => {
            titleElement.style.opacity = '0';
            titleElement.style.transform = 'translateY(10px)';
            titleElement.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % sentences.length;
                titleElement.textContent = sentences[currentIndex];

                const themes = ['btn-theme-1', 'btn-theme-2', 'btn-theme-3', 'btn-theme-4'];
                nextBtn.className = 'btn ' + themes[currentIndex];

                titleElement.style.opacity = '1';
                titleElement.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>
</body>

</html>
